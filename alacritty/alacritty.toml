[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 12.0

[env]
TERM = "xterm-256color"

[colors.primary]
background = "#080713"
foreground = "#e4b9d4"

[colors.cursor]
text = "#080713"
cursor = "#B1368D"

[colors.normal]
black = "#080713"
red = "#B1368D"
green = "#B1368D"
yellow = "#e4b9d4"
blue = "#B1368D"
magenta = "#B1368D"
cyan = "#e4b9d4"
white = "#e4b9d4"

[colors.bright]
black = "#1e1e2e"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#ffffff"

[window]
opacity = 0.90
startup_mode = "Maximized"

[window.padding]
y = 10
x = 20

[scrolling]
history = 10000
